name: Deploy Backend Only
on:
  push:
    branches: [master]
    paths:
      - 'app/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Add SSH key
      uses: webfactory/ssh-agent@v0.7.0
      with:
        ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

    - name: Deploy backend via SSH commands
      run: |
        # Добавляем хост в known_hosts
        mkdir -p ~/.ssh
        ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts
        
        # Синхронизируем только app директорию
        rsync -avz --delete \
          --exclude='.git' \
          --exclude='*.log' \
          --exclude='__pycache__' \
          --exclude='*.pyc' \
          -e "ssh -o StrictHostKeyChecking=no -p ${{ secrets.SERVER_PORT || '22' }}" \
          ./app/ \
          ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:~/goster/app/
        
        # Выполняем деплой на сервере
        ssh -o StrictHostKeyChecking=no \
            -p ${{ secrets.SERVER_PORT || '22' }} \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
        set -e
        set -x
        
        cd ~/goster
        
        # Бэкап app директории
        if [ -d "app" ]; then
          tar -czf /tmp/app-backup-$(date +%Y%m%d-%H%M%S).tar.gz app/
          echo "✅ App backup created"
        fi
        
        # Пересобираем только app сервис
        echo "=== Building app service ==="
        docker compose build app
        
        # Перезапускаем только app сервис
        echo "=== Restarting app service ==="
        docker compose up -d --no-deps --force-recreate app
        
        # Health check для app
        echo "=== Health check ==="
        sleep 10
        
        if ! docker ps --filter "name=goster_app" --format "{{.Status}}" | grep -q "Up"; then
          echo "❌ App container failed to start"
          docker logs goster_app --tail=50
          exit 1
        fi
        
        # Проверяем что postgres и nginx работают
        echo "=== Checking other services ==="
        if ! docker ps --filter "name=goster_postgres" --format "{{.Status}}" | grep -q "Up"; then
          echo "⚠️ Warning: Postgres is not running!"
        else
          echo "✅ Postgres is running"
        fi
        
        if ! docker ps --filter "name=goster_nginx" --format "{{.Status}}" | grep -q "Up"; then
          echo "⚠️ Warning: Nginx is not running!"
        else
          echo "✅ Nginx is running"
        fi
        
        # Очистка старых образов
        echo "=== Cleanup ==="
        docker image prune -f
        
        echo "✅ App deployed successfully! Postgres and Nginx were not affected."
        EOF
      
    - name: Send notification on failure
      if: failure()
      run: |
        ssh -o StrictHostKeyChecking=no \
            -p ${{ secrets.SERVER_PORT || '22' }} \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
        cd ~/goster
        echo "❌ Deployment failed, checking app logs..."
        docker logs --tail=100 goster_app || true
        EOF
